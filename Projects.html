<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/x-icon" href="Sacred_/Ryuga.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="Css/projects.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="Css/loader.css">
    <title>My Projects</title>
</head>
<body>
    <div id="loader">
        <div class="lds-hourglass"></div>
    </div>
    <nav>
        <a href="./index">Back</a>
        <h1 class="title">MY<span class="vade">PROJECTS</span></h1>
        <div class="theme-icon" onclick="toggleTheme()"></div>
    </nav>
    <section class="projects-section">
        <div class="carousel">

            <div class="arrow arrow-left" onclick="prevProject()">&#9664;</div>
            <div class="project-card full-width half-width">
                <div class="project-logo">
                    <img src="./Sacred_/panther.jpg" alt="Nostalgic">
                </div>
                <h2>Nostalgic</h2>
                <p class="project-description">This One is Secret</p>
                <a class="download-button" href="./Nostalgic">Visit</a>
            </div>

            
            <div class="project-card half-width">
                <div class="project-logo">
                    <img src="./Sacred_/kps-logo.png" alt="KPS-SYSTEM">
                </div>
                <h2>KPS-System</h2>
                <p class="project-description">C-Project related to Oxford College of Engineering Management 2nd Semester.</p>
                <a class="download-button" href="./KPS-System">Overview</a>
            </div>
            

            <div class="project-card half-width">
                <div class="project-logo">
                    <img src="./Sacred_/inprogress.png" alt="stay tuned">
                </div>
                <h2>Pending</h2>
                <p class="project-description">Will be updating...</p>
            </div>
            <div class="arrow arrow-right" onclick="nextProject()">&#9654;</div>
        </div>
    </section>
  
   
<section class="latest-project">
    <div class="latest-link-box">
        <a class="latest-link" href="https://github.com/RyuZinOh/RyuZinOh.github.io">Github Latest Project</a>
        <div class="tooltip">"Expertise Discord Bot "</div>
    </div>
</section>





    <script src="Js/theme.js"></script>
    <script src="Js/loader.js"></script>
    <script>
        const projectCards = document.querySelectorAll('.project-card');
        let currentIndex = 1;

        function showProject(index) {
            projectCards.forEach((card, i) => {
                if (i === index) {
                    card.style.display = 'block';
                    card.style.opacity = '1';
                } else {
                    card.style.display = 'none';
                    card.style.opacity = '0';
                }
            });
        }

        function nextProject() {
            currentIndex = (currentIndex + 1) % projectCards.length;
            showProject(currentIndex);
        }

        function prevProject() {
            currentIndex = (currentIndex - 1 + projectCards.length) % projectCards.length;
            showProject(currentIndex);
        }

        showProject(currentIndex);
    </script>
</body>
</html>
